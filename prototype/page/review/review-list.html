<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>审核管理 - 服务注册与发现</title>
  <link rel="stylesheet" href="../../css/base.css" />
</head>
<body>
  <div class="toast-list"></div>
  <div id="confirm-overlay" class="confirm-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title"><span>⚠️</span><span id="confirm-title">操作确认</span></div>
      <div class="confirm-content" id="confirm-content"></div>
      <div class="confirm-actions">
        <button class="btn btn-default" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="confirmOk()">确定</button>
      </div>
    </div>
  </div>
<main class="main-content">
      <div class="page-header">
        <nav class="breadcrumb">
          <span>服务注册与发现</span><span class="sep">/</span><span class="current">审核列表</span>
        </nav>
        <div class="page-title-row">
          <h2 class="page-title">审核列表</h2>
        </div>
      </div>

      <div class="content-body">
        <div class="search-bar">
          <div class="search-item">
            <label>状态</label>
            <select id="search-status" class="ant-select">
              <option value="">全部状态</option>
              <option value="approved">已通过</option>
              <option value="rejected">未通过</option>
              <option value="pending">审核中</option>
            </select>
          </div>
          <div class="search-item">
            <label>关键词</label>
            <input id="search-kw" class="ant-input" placeholder="搜索目标服务、申请人、申请理由" onkeyup="if(event.key==='Enter')handleSearch()" />
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="handleSearch()">查询</button>
            <button class="btn btn-default" onclick="handleReset()">重置</button>
          </div>
        </div>

        <div class="ant-card">
          <table class="ant-table" style="width:100%">
            <thead>
              <tr>
                <th>申请 ID</th>
                <th>目标服务</th>
                <th>客户端</th>
                <th>客户端类型</th>
                <th>状态</th>
                <th>申请人</th>
                <th>申请时间</th>
                <th>审核时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
          <div class="table-footer">
            <span id="page-total" class="pagination-total"></span>
            <div id="pagination" class="ant-pagination"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 审核操作 Modal -->
  <div id="review-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeReviewModal()">
    <div class="ant-modal" style="width:560px">
      <div class="modal-header">
        <span class="modal-title">审核申请</span>
        <button class="modal-close" onclick="closeReviewModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="review-info" class="desc-list" style="margin-bottom:16px"></div>
        <hr class="divider" />
        <div class="form-item">
          <label class="form-label">审核备注</label>
          <div class="form-control">
            <textarea id="form-review-note" class="ant-input" rows="3" placeholder="可填写通过或拒绝的理由（选填）"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeReviewModal()">取消</button>
        <button class="btn btn-danger"  onclick="submitReview('rejected')">拒绝</button>
        <button class="btn btn-primary" onclick="submitReview('approved')">通过</button>
      </div>
    </div>
  </div>

  <!-- 查看详情 Modal -->
  <div id="view-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeViewModal()">
    <div class="ant-modal" style="width:560px">
      <div class="modal-header">
        <span class="modal-title">申请详情</span>
        <button class="modal-close" onclick="closeViewModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="view-desc-list" class="desc-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeViewModal()">关闭</button>
      </div>
    </div>

<script src="../../data/reviews.js"></script>
<script src="../../js/common.js"></script>
<script>
const PAGE_SIZE = 10;
let currentPage = 1;
let activeFilter = { status: '', kw: '' };
let reviewingId = null;


const { load, save } = useStorage('srsd_reviews', SEED_REVIEWS);
let list = load();

const STATUS_MAP = {
  approved: { label: '已通过', cls: 'tag-success' },
  rejected: { label: '未通过', cls: 'tag-error' },
  pending:  { label: '审核中', cls: 'tag-processing' },
};
const CLIENT_TYPE_MAP = { service: '服务', user: '用户' };

function getFilteredList() {
  return list.filter(item => {
    const statusOk = !activeFilter.status || item.status === activeFilter.status;
    const kwOk     = !activeFilter.kw     || item.target.includes(activeFilter.kw) || item.applicant.includes(activeFilter.kw) || item.reason.includes(activeFilter.kw);
    return statusOk && kwOk;
  });
}

function renderTable() {
  const filtered = getFilteredList();
  const paged = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  const tbody = document.getElementById('table-body');
  document.getElementById('page-total').textContent = `共 ${filtered.length} 条`;

  if (paged.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-table">暂无数据</div></td></tr>';
    renderPagination(0);
    return;
  }
  tbody.innerHTML = paged.map(row => `
    <tr>
      <td>${escHtml(String(row.seqId))}</td>
      <td><a href="#">${escHtml(row.target)}</a></td>
      <td>${escHtml(row.client)}</td>
      <td>${escHtml(CLIENT_TYPE_MAP[row.clientType] || row.clientType)}</td>
      <td><span class="tag ${STATUS_MAP[row.status]?.cls || 'tag-default'}">${STATUS_MAP[row.status]?.label || row.status}</span></td>
      <td>${escHtml(row.applicant)}</td>
      <td>${escHtml(formatTime(row.appliedAt))}</td>
      <td>${row.reviewedAt ? escHtml(formatTime(row.reviewedAt)) : '--'}</td>
      <td>
        <button class="btn btn-link" data-action="view"   data-id="${escHtml(row.id)}">查看</button>
        ${row.status === 'pending' ? `<button class="btn btn-link" data-action="review" data-id="${escHtml(row.id)}">审核</button>` : ''}
      </td>
    </tr>
  `).join('');
  renderPagination(filtered.length);
}

function renderPagination(total) {
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">‹</button>`;
  for (let p = 1; p <= totalPages; p++) {
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  html += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

document.getElementById('table-body').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = btn.dataset.id;
  if (btn.dataset.action === 'view')   openViewModal(id);
  if (btn.dataset.action === 'review') openReviewModal(id);
});

document.getElementById('pagination').addEventListener('click', e => {
  const btn = e.target.closest('[data-page]');
  if (!btn || btn.disabled) return;
  const totalPages = Math.max(1, Math.ceil(getFilteredList().length / PAGE_SIZE));
  const p = Number(btn.dataset.page);
  if (p >= 1 && p <= totalPages) { currentPage = p; renderTable(); }
});

function handleSearch() {
  activeFilter.status = document.getElementById('search-status').value;
  activeFilter.kw     = document.getElementById('search-kw').value.trim();
  currentPage = 1;
  renderTable();
}

function handleReset() {
  document.getElementById('search-status').value = '';
  document.getElementById('search-kw').value     = '';
  activeFilter = { status: '', kw: '' };
  currentPage  = 1;
  renderTable();
}

function openReviewModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  reviewingId = id;
  document.getElementById('review-info').innerHTML = [
    { label: '申请 ID',  value: String(row.seqId) },
    { label: '目标服务', value: row.target },
    { label: '客户端',   value: row.client },
    { label: '申请人',   value: row.applicant },
    { label: '申请理由', value: row.reason },
    { label: '申请时间', value: formatTime(row.appliedAt) },
  ].map(r => `
    <div class="desc-item">
      <div class="desc-label">${escHtml(r.label)}</div>
      <div class="desc-value">${escHtml(r.value)}</div>
    </div>
  `).join('');
  document.getElementById('form-review-note').value = '';
  openModal(document.getElementById('review-modal'));
}

function closeReviewModal() { closeModal(document.getElementById('review-modal')); reviewingId = null; }

function submitReview(decision) {
  if (!reviewingId) return;
  const row = list.find(r => r.id === reviewingId);
  if (row) { row.status = decision; row.reviewedAt = now(); }
  save(list);
  closeReviewModal();
  renderTable();
  showToast(decision === 'approved' ? '已通过该申请' : '已拒绝该申请', decision === 'approved' ? '✅' : '❌');
}

function openViewModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  document.getElementById('view-desc-list').innerHTML = [
    { label: '申请 ID',    value: String(row.seqId) },
    { label: '目标服务',   value: row.target },
    { label: '客户端',     value: row.client },
    { label: '客户端类型', value: CLIENT_TYPE_MAP[row.clientType] || row.clientType },
    { label: '状态',       value: STATUS_MAP[row.status]?.label || row.status },
    { label: '申请人',     value: row.applicant },
    { label: '申请理由',   value: row.reason },
    { label: '申请时间',   value: formatTime(row.appliedAt) },
    { label: '审核时间',   value: row.reviewedAt ? formatTime(row.reviewedAt) : '--' },
  ].map(r => `
    <div class="desc-item">
      <div class="desc-label">${escHtml(r.label)}</div>
      <div class="desc-value">${escHtml(r.value)}</div>
    </div>
  `).join('');
  openModal(document.getElementById('view-modal'));
}

function closeViewModal() { closeModal(document.getElementById('view-modal')); }

renderTable();
</script>
</body>
</html>

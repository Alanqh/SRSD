<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟服务 - 服务注册与发现</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <style>
    .weight-badge { display:inline-block; padding:2px 8px; background:#f0f5ff; border:1px solid #adc6ff; color:#2f54eb; font-size:12px; min-width:40px; text-align:center; border-radius:2px; }
    .route-card { border:1px solid #d9d9d9; margin-bottom:8px; }
    .route-card-header { display:flex; align-items:center; justify-content:space-between; padding:5px 10px; background:#fafafa; border-bottom:1px solid #f0f0f0; font-size:13px; font-weight:500; }
    .route-card-body { padding:10px 10px 6px; }
    .cond-table { width:100%; border-collapse:collapse; margin-bottom:4px; }
    .cond-table th { font-size:11px; color:rgba(0,0,0,0.45); padding:0 6px 4px 0; font-weight:normal; text-align:left; white-space:nowrap; }
    .cond-table td { padding:0 6px 5px 0; vertical-align:middle; }
    .cond-table td:last-child { padding-right:0; text-align:center; width:26px; }
    .cond-dash { color:rgba(0,0,0,0.25); font-size:13px; display:block; text-align:center; line-height:32px; }
    .route-upstream-section { margin-top:8px; padding-top:8px; border-top:1px dashed #f0f0f0; }
    .route-upstream-label { font-size:12px; color:rgba(0,0,0,0.65); margin-bottom:6px; }
    .upstream-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .route-summary { font-size:12px; color:rgba(0,0,0,0.45); }
    .modal-body-scroll { max-height:calc(80vh - 120px); overflow-y:auto; }
  </style>
</head>
<body>
<div class="toast-list"></div>
<div id="confirm-overlay" class="confirm-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <div class="confirm-title"><span>⚠️</span><span id="confirm-title">操作确认</span></div>
    <div class="confirm-content" id="confirm-content"></div>
    <div class="confirm-actions">
      <button class="btn btn-default" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" onclick="confirmOk()">确定</button>
    </div>
  </div>
</div>

<main class="main-content">
  <div class="page-header">
    <nav class="breadcrumb">
      <span>服务注册与发现</span><span class="sep">/</span>
      <a href="service-list.html">服务</a><span class="sep">/</span>
      <span class="current">虚拟服务</span>
    </nav>
    <div class="page-title-row">
      <h2 class="page-title">虚拟服务</h2>
    </div>
  </div>

  <div class="content-body">
    <div class="alert alert-info" style="margin-bottom:0">
      ℹ️ 虚拟服务没有实例，通过配置条件路由规则和默认后端，将流量转发到同一命名空间下的真实服务，实现灰度发布、蓝绿切换等场景。
    </div>

    <div class="search-bar">
      <button class="btn btn-primary" onclick="openCreateModal()" style="align-self:flex-end;white-space:nowrap">+ 新建虚拟服务</button>
      <div class="search-item">
        <label>命名空间</label>
        <select id="search-ns" class="ant-select">
          <option value="">全部命名空间</option>
          <option value="cloud-native">cloud-native</option>
          <option value="panther-backend">panther-backend</option>
          <option value="panther-web">panther-web</option>
        </select>
      </div>
      <div class="search-item">
        <label>关键词</label>
        <input id="search-kw" class="ant-input" placeholder="搜索虚拟服务名称、描述" onkeyup="if(event.key==='Enter')applySearch()" />
      </div>
      <div class="search-actions">
        <button class="btn btn-primary" onclick="applySearch()">查询</button>
        <button class="btn btn-default" onclick="handleReset()">重置</button>
      </div>
    </div>

    <div class="ant-card">
      <table class="ant-table" style="width:100%">
        <thead>
          <tr>
            <th>虚拟服务名称</th>
            <th>命名空间</th>
            <th>代理地址</th>
            <th>流量规则</th>
            <th>创建人</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="table-footer">
        <span id="page-total" class="pagination-total"></span>
        <div id="pagination" class="ant-pagination"></div>
      </div>
    </div>
  </div>
</main>

<!-- 新建/编辑 Modal -->
<div id="vs-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeVsModal()">
  <div class="ant-modal" style="width:700px">
    <div class="modal-header">
      <span id="modal-title" class="modal-title">新建虚拟服务</span>
      <button class="modal-close" onclick="closeVsModal()">×</button>
    </div>
    <div class="modal-body modal-body-scroll">
      <div class="form-item">
        <label class="form-label required">服务名称</label>
        <div class="form-control">
          <input id="form-name" class="ant-input" placeholder="以小写字母开头，可包含字母、数字和连字符" />
          <div id="error-name" class="form-error-msg" style="display:none"></div>
        </div>
      </div>
      <div class="form-item">
        <label class="form-label required">命名空间</label>
        <div class="form-control">
          <select id="form-ns" class="ant-select">
            <option value="">请选择</option>
            <option value="cloud-native">cloud-native</option>
            <option value="panther-backend">panther-backend</option>
            <option value="panther-web">panther-web</option>
          </select>
          <div id="error-ns" class="form-error-msg" style="display:none"></div>
        </div>
      </div>

      <div class="form-item">
        <label class="form-label required">协议类型</label>
        <div class="form-control">
          <select id="form-protocol" class="ant-select">
            <option value="http">http</option>
            <option value="https">https</option>
          </select>
        </div>
      </div>

      <div class="form-item">
        <label class="form-label">描述</label>
        <div class="form-control">
          <textarea id="form-desc" class="ant-input" rows="3" placeholder="说明该虚拟服务的用途，如灰度发布策略（选填）"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeVsModal()">取消</button>
      <button class="btn btn-primary" onclick="submitVsModal()">确定</button>
    </div>
  </div>
</div>

<!-- 代理地址 Modal -->
<div id="proxy-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeProxyModal()">
  <div class="ant-modal" style="width:560px">
    <div class="modal-header">
      <span class="modal-title" id="proxy-modal-title">代理地址</span>
      <button class="modal-close" onclick="closeProxyModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;border-bottom:1px solid #f0f0f0;margin-bottom:16px">
        <div id="proxy-tab-http"  class="tab-item active" style="padding:6px 16px;cursor:pointer" onclick="switchProxyTab('http')">HTTP</div>
        <div id="proxy-tab-https" class="tab-item"        style="padding:6px 16px;cursor:pointer" onclick="switchProxyTab('https')">HTTPS</div>
      </div>
      <div id="proxy-panel-http"></div>
      <div id="proxy-panel-https" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeProxyModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 流量规则 Modal -->
<div id="traffic-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeTrafficModal()">
  <div class="ant-modal" style="width:700px">
    <div class="modal-header">
      <span class="modal-title" id="traffic-modal-title">流量规则</span>
      <button class="modal-close" onclick="closeTrafficModal()">×</button>
    </div>
    <div class="modal-body modal-body-scroll">
      <div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:500;color:rgba(0,0,0,0.85);margin-bottom:8px">默认后端</div>
        <div id="traffic-default-backend"></div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:500;color:rgba(0,0,0,0.85);margin-bottom:8px">条件路由</div>
        <div id="traffic-routes"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeTrafficModal()">关闭</button>
    </div>
  </div>
</div>

<script src="../../data/virtual-services.js"></script>
<script src="../../data/services.js"></script>
<script src="../../js/common.js"></script>
<script>
const PAGE_SIZE = 10;
let currentPage = 1;
let editingId = null;
let activeFilter = { ns: '', kw: '' };

const { load, save } = useStorage('srsd_virtual_services', SEED_VIRTUAL_SERVICES);
let list = load();

const { load: loadSvcs } = useStorage('srsd_services', SEED_SERVICES);
const allSvcs = loadSvcs();

const NS_BIZLINE = {
  'domeos-pub': '北京研发中心', 'sohu-cs-public': '北京研发中心',
  'changjie-test': '北京研发中心', 'panther-backend': '大数据中心',
  'cloud-native': '大数据中心', 'panther-web': '大数据中心', 'image-delete': '北京研发部',
};

const COND_TYPE_LABEL  = { header: 'HTTP 请求头', cookie: 'Cookie', query: '查询参数', path: '路径前缀' };
const MATCH_TYPE_LABEL = { exact: '精确', prefix: '前缀', regex: '正则' };

function getFilteredList() {
  return list.filter(item => {
    const nsOk = !activeFilter.ns || item.ns === activeFilter.ns;
    const kwOk = !activeFilter.kw || item.name.includes(activeFilter.kw) || (item.desc||'').includes(activeFilter.kw);
    return nsOk && kwOk;
  });
}

function routeSummary(row) {
  const routes = row.routes || [];
  const db = row.defaultBackend || (row.backends && row.backends[0]) || null;
  const dbName = db ? (db.serviceName || db.serviceId) : '--';
  if (routes.length === 0) return `仅默认后端：${dbName}`;
  return `${routes.length} 条条件路由，默认：${dbName}`;
}

function renderTable() {
  const filtered = getFilteredList();
  const paged    = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  document.getElementById('page-total').textContent = `共 ${filtered.length} 条`;
  const tbody = document.getElementById('table-body');
  if (paged.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-table">暂无虚拟服务</div></td></tr>';
    renderPagination(0); return;
  }
  tbody.innerHTML = paged.map(row => `<tr>
    <td><a href="virtual-service-detail.html?id=${escHtml(row.id)}">${escHtml(row.name)}</a></td>
    <td>${escHtml(row.ns)}</td>
    <td>
      <button class="btn btn-default btn-sm" onclick="openProxyModal('${escHtml(row.id)}')">查看</button>
    </td>
    <td>
      <button class="btn btn-default btn-sm" onclick="openTrafficModal('${escHtml(row.id)}')">查看</button>
    </td>
    <td>${escHtml(row.createdBy)}</td>
    <td>${escHtml(formatTime(row.createdAt))}</td>
    <td>
      <a class="btn btn-link" href="virtual-service-detail.html?id=${escHtml(row.id)}">详情</a>
      <button class="btn btn-link" data-action="edit"   data-id="${escHtml(row.id)}">编辑</button>
      <button class="btn btn-link danger" data-action="delete" data-id="${escHtml(row.id)}">删除</button>
    </td>
  </tr>`).join('');
  renderPagination(filtered.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE) || 1;
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML =
    `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>` +
    Array.from({length:pages},(_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('') +
    `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>`;
}
function goPage(p) {
  const pages = Math.ceil(getFilteredList().length / PAGE_SIZE) || 1;
  if (p < 1 || p > pages) return;
  currentPage = p; renderTable();
}
function applySearch() {
  activeFilter.ns = document.getElementById('search-ns').value;
  activeFilter.kw = document.getElementById('search-kw').value.trim();
  currentPage = 1; renderTable();
}
function handleReset() {
  document.getElementById('search-ns').value = '';
  document.getElementById('search-kw').value = '';
  activeFilter = { ns: '', kw: '' };
  currentPage = 1; renderTable();
}

/* ── Proxy Modal ── */
function buildProxyPanel(proto, domain, aliases) {
  const defaultAddr = `${proto}://${domain}`;
  let html = `
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:rgba(0,0,0,0.45);margin-bottom:6px">默认代理地址</div>
      <div style="display:flex;align-items:center;gap:8px;background:#fafafa;border:1px solid #f0f0f0;padding:8px 12px">
        <span style="font-family:monospace;font-size:13px;flex:1;word-break:break-all">${escHtml(defaultAddr)}</span>
        <button class="btn btn-default btn-sm" onclick="window.open('${escHtml(defaultAddr)}', '_blank')">访问</button>
        <button class="btn btn-default btn-sm" onclick="copyProxyAddr('${escHtml(defaultAddr)}')">复制</button>
      </div>
    </div>`;
  const aliasArr = aliases || [];
  if (proto === 'http') {
    if (aliasArr.length > 0) {
      html += `<div><div style="font-size:12px;color:rgba(0,0,0,0.45);margin-bottom:6px">别名代理地址</div>`;
      aliasArr.forEach(alias => {
        const aliasUrl = `${proto}://${alias}`;
        html += `<div style="display:flex;align-items:center;gap:8px;background:#fafafa;border:1px solid #f0f0f0;padding:8px 12px;margin-bottom:4px">
          <span style="font-family:monospace;font-size:13px;flex:1;word-break:break-all">${escHtml(aliasUrl)}</span>
          <button class="btn btn-default btn-sm" onclick="window.open('${escHtml(aliasUrl)}', '_blank')">访问</button>
          <button class="btn btn-default btn-sm" onclick="copyProxyAddr('${escHtml(aliasUrl)}')">复制</button>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div style="color:rgba(0,0,0,0.25);font-size:13px">暂无别名代理地址</div>`;
    }
  }
  return html;
}

function switchProxyTab(proto) {
  document.getElementById('proxy-tab-http').classList.toggle('active', proto === 'http');
  document.getElementById('proxy-tab-https').classList.toggle('active', proto === 'https');
  document.getElementById('proxy-panel-http').style.display  = proto === 'http'  ? '' : 'none';
  document.getElementById('proxy-panel-https').style.display = proto === 'https' ? '' : 'none';
}

function openProxyModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  document.getElementById('proxy-modal-title').textContent = `代理地址 — ${row.name}`;
  document.getElementById('proxy-panel-http').innerHTML  = buildProxyPanel('http',  row.proxy, row.aliases);
  document.getElementById('proxy-panel-https').innerHTML = buildProxyPanel('https', row.proxy, row.aliases);
  const activeProto = (row.protocol === 'https') ? 'https' : 'http';
  switchProxyTab(activeProto);
  openModal(document.getElementById('proxy-modal'));
}

function closeProxyModal() { closeModal(document.getElementById('proxy-modal')); }

function copyProxyAddr(addr) {
  navigator.clipboard?.writeText(addr).then(() => showToast('已复制到剪贴板'))
    .catch(() => showToast('复制失败', '❌'));
}

/* ── Traffic Modal ── */
function openTrafficModal(id) {
  const vs = list.find(x => x.id === id);
  if (!vs) return;
  document.getElementById('traffic-modal-title').textContent = `流量规则 - ${vs.name}`;

  const db = vs.defaultBackend || {};
  document.getElementById('traffic-default-backend').innerHTML = db.serviceName || db.serviceId
    ? `<div style="font-size:13px;color:rgba(0,0,0,0.85)">
        <a href="service-detail.html?id=${escHtml(db.serviceId)}&tab=instances" style="color:#1890ff;text-decoration:none">
          ${escHtml(db.serviceName || db.serviceId)}
        </a>
      </div>`
    : '<div style="color:rgba(0,0,0,0.25);font-size:13px">未配置</div>';

  const routes = vs.routes || [];
  if (routes.length === 0) {
    document.getElementById('traffic-routes').innerHTML =
      '<div style="color:rgba(0,0,0,0.25);font-size:13px">暂无条件路由</div>';
  } else {
    document.getElementById('traffic-routes').innerHTML = routes.map((r, i) => {
      const condHtml = r.conditions.map(c => {
        const typeLabel = COND_TYPE_LABEL[c.type] || c.type;
        const matchLabel = c.type === 'path' ? '前缀' : (MATCH_TYPE_LABEL[c.matchType] || c.matchType);
        const fieldPart = c.type === 'path' ? '' : `<strong>${escHtml(c.field)}</strong> `;
        return `<span style="display:inline-block;padding:2px 8px;background:#f0f5ff;border:1px solid #adc6ff;color:#2f54eb;font-size:12px;border-radius:2px;margin:2px">${escHtml(typeLabel)} ${fieldPart}${escHtml(matchLabel)} "${escHtml(c.value)}"</span>`;
      }).join('<span style="font-size:12px;color:rgba(0,0,0,0.45);margin:0 4px">且</span>');

      const upstreams = r.upstreams || (r.targetServiceId ? [{ serviceId: r.targetServiceId, serviceName: r.targetServiceName || '', weight: 100 }] : []);
      const upstreamHtml = upstreams.map(u =>
        `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <a href="service-detail.html?id=${escHtml(u.serviceId)}&tab=instances" style="font-size:13px;color:#1890ff;text-decoration:none">
            ${escHtml(u.serviceName || u.serviceId)}
          </a>
          <span class="weight-badge">${u.weight}%</span>
        </div>`
      ).join('');

      return `<div class="route-card">
        <div class="route-card-header"><span>规则 #${i + 1}</span></div>
        <div class="route-card-body">
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:rgba(0,0,0,0.45);margin-bottom:6px">匹配条件</div>
            <div>${condHtml}</div>
          </div>
          <div>
            <div style="font-size:12px;color:rgba(0,0,0,0.45);margin-bottom:6px">命中时按权重转发至</div>
            ${upstreamHtml}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  openModal(document.getElementById('traffic-modal'));
}

function closeTrafficModal() { closeModal(document.getElementById('traffic-modal')); }

/* ── Open / Close Modals ── */

function openCreateModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新建虚拟服务';
  document.getElementById('form-name').value    = '';
  document.getElementById('form-name').disabled = false;
  document.getElementById('form-ns').value      = '';
  document.getElementById('form-protocol').value = 'http';
  document.getElementById('form-desc').value    = '';
  ['error-name','error-ns'].forEach(id => { document.getElementById(id).style.display = 'none'; });
  openModal(document.getElementById('vs-modal'));
}

function openEditModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '编辑虚拟服务';
  document.getElementById('form-name').value    = row.name;
  document.getElementById('form-name').disabled = true;
  document.getElementById('form-ns').value      = row.ns;
  document.getElementById('form-protocol').value = row.protocol || 'http';
  document.getElementById('form-desc').value    = row.desc || '';
  ['error-name','error-ns'].forEach(id => { document.getElementById(id).style.display = 'none'; });
  openModal(document.getElementById('vs-modal'));
}

function closeVsModal() { closeModal(document.getElementById('vs-modal')); }

/* ── Submit ── */

function submitVsModal() {
  const name     = document.getElementById('form-name').value.trim();
  const ns       = document.getElementById('form-ns').value;
  const protocol = document.getElementById('form-protocol').value;
  let ok = true;

  if (!name || !/^[a-z][a-z0-9-]*$/.test(name)) {
    document.getElementById('error-name').textContent = '名称以小写字母开头，可包含小写字母、数字和连字符';
    document.getElementById('error-name').style.display = ''; ok = false;
  } else document.getElementById('error-name').style.display = 'none';

  if (!ns) {
    document.getElementById('error-ns').textContent = '请选择命名空间';
    document.getElementById('error-ns').style.display = ''; ok = false;
  } else document.getElementById('error-ns').style.display = 'none';

  if (!ok) return;

  const bizline = NS_BIZLINE[ns] || '';
  const desc    = document.getElementById('form-desc').value.trim();
  const proxy   = `${name}-${ns}.domeos.sohucs.com`;

  if (editingId) {
    list = list.map(r => r.id === editingId ? { ...r, ns, bizline, protocol, desc } : r);
    showToast('虚拟服务已更新');
  } else {
    if (list.find(r => r.name === name && r.ns === ns)) {
      document.getElementById('error-name').textContent = '该命名空间下服务名已存在';
      document.getElementById('error-name').style.display = ''; return;
    }
    list.unshift({ id: genId(), name, ns, bizline, proxy, protocol, desc,
      defaultBackend: null, routes: [],
      auth: 'disabled', createdBy: '吕青华', createdAt: now() });
    showToast('虚拟服务已创建');
  }
  save(list); closeVsModal(); renderTable();
}

/* ── Event delegation ── */
document.addEventListener('click', e => {
  const action = e.target.dataset.action;
  const id     = e.target.dataset.id;
  if (!action || !id) return;
  if (action === 'edit') { openEditModal(id); }
  if (action === 'delete') {
    const row = list.find(r => r.id === id);
    confirm2(`确认删除虚拟服务「${row?.name}」？`, () => {
      list = list.filter(r => r.id !== id);
      save(list); renderTable(); showToast('已删除');
    });
  }
});

document.getElementById('search-ns').addEventListener('change', e => { activeFilter.ns = e.target.value; currentPage = 1; renderTable(); });

renderTable();
</script>
</body>
</html>

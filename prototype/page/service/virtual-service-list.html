<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟服务 - 服务注册与发现</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <style>
    .weight-badge { display:inline-block; padding:2px 8px; background:#f0f5ff; border:1px solid #adc6ff; color:#2f54eb; font-size:12px; min-width:40px; text-align:center; border-radius:2px; }
    .route-card { border:1px solid #d9d9d9; margin-bottom:8px; }
    .route-card-header { display:flex; align-items:center; justify-content:space-between; padding:5px 10px; background:#fafafa; border-bottom:1px solid #f0f0f0; font-size:13px; font-weight:500; }
    .route-card-body { padding:10px 10px 6px; }
    .cond-table { width:100%; border-collapse:collapse; margin-bottom:4px; }
    .cond-table th { font-size:11px; color:rgba(0,0,0,0.45); padding:0 6px 4px 0; font-weight:normal; text-align:left; white-space:nowrap; }
    .cond-table td { padding:0 6px 5px 0; vertical-align:middle; }
    .cond-table td:last-child { padding-right:0; text-align:center; width:26px; }
    .cond-dash { color:rgba(0,0,0,0.25); font-size:13px; display:block; text-align:center; line-height:32px; }
    .route-target-row { display:flex; align-items:center; gap:8px; margin-top:8px; padding-top:8px; border-top:1px dashed #f0f0f0; }
    .route-target-label { font-size:12px; color:rgba(0,0,0,0.65); white-space:nowrap; }
    .backend-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .route-summary { font-size:12px; color:rgba(0,0,0,0.45); }
    .modal-body-scroll { max-height:calc(80vh - 120px); overflow-y:auto; }
  </style>
</head>
<body>
<div class="toast-list"></div>
<div id="confirm-overlay" class="confirm-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <div class="confirm-title"><span>⚠️</span><span id="confirm-title">操作确认</span></div>
    <div class="confirm-content" id="confirm-content"></div>
    <div class="confirm-actions">
      <button class="btn btn-default" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" onclick="confirmOk()">确定</button>
    </div>
  </div>
</div>

<main class="main-content">
  <div class="page-header">
    <nav class="breadcrumb">
      <span>服务注册与发现</span><span class="sep">/</span>
      <a href="service-list.html">服务</a><span class="sep">/</span>
      <span class="current">虚拟服务</span>
    </nav>
    <div class="page-title-row">
      <h2 class="page-title">虚拟服务</h2>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openCreateModal()">+ 新建虚拟服务</button>
      </div>
    </div>
  </div>

  <div class="content-body">
    <div class="alert alert-info" style="margin-bottom:0">
      ℹ️ 虚拟服务没有实例，通过配置条件路由规则和默认权重分配，将流量转发到同一命名空间下的真实服务，实现灰度发布、蓝绿切换等场景。
    </div>

    <div class="search-bar">
      <div class="search-item">
        <label>命名空间</label>
        <select id="search-ns" class="ant-select">
          <option value="">全部命名空间</option>
          <option value="cloud-native">cloud-native</option>
          <option value="panther-backend">panther-backend</option>
          <option value="panther-web">panther-web</option>
        </select>
      </div>
      <div class="search-item">
        <label>关键词</label>
        <input id="search-kw" class="ant-input" placeholder="搜索虚拟服务名称、描述" onkeyup="if(event.key==='Enter')applySearch()" />
      </div>
      <div class="search-actions">
        <button class="btn btn-primary" onclick="applySearch()">查询</button>
        <button class="btn btn-default" onclick="handleReset()">重置</button>
      </div>
    </div>

    <div class="ant-card">
      <table class="ant-table" style="width:100%">
        <thead>
          <tr>
            <th>虚拟服务名称</th>
            <th>命名空间</th>
            <th>代理地址</th>
            <th>流量规则</th>
            <th>创建人</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="table-footer">
        <span id="page-total" class="pagination-total"></span>
        <div id="pagination" class="ant-pagination"></div>
      </div>
    </div>
  </div>
</main>

<!-- 新建/编辑 Modal -->
<div id="vs-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeVsModal()">
  <div class="ant-modal" style="width:700px">
    <div class="modal-header">
      <span id="modal-title" class="modal-title">新建虚拟服务</span>
      <button class="modal-close" onclick="closeVsModal()">×</button>
    </div>
    <div class="modal-body modal-body-scroll">
      <div class="form-item">
        <label class="form-label required">服务名称</label>
        <div class="form-control">
          <input id="form-name" class="ant-input" placeholder="以小写字母开头，可包含字母、数字和连字符" />
          <div id="error-name" class="form-error-msg" style="display:none"></div>
        </div>
      </div>
      <div class="form-item">
        <label class="form-label required">命名空间</label>
        <div class="form-control">
          <select id="form-ns" class="ant-select" onchange="handleNsChange()">
            <option value="">请选择</option>
            <option value="cloud-native">cloud-native</option>
            <option value="panther-backend">panther-backend</option>
            <option value="panther-web">panther-web</option>
          </select>
          <div id="error-ns" class="form-error-msg" style="display:none"></div>
        </div>
      </div>

      <div class="form-item" style="align-items:flex-start">
        <label class="form-label" style="padding-top:2px">条件路由</label>
        <div class="form-control">
          <div class="form-hint" style="margin-top:0;margin-bottom:8px">按优先级匹配，第一条满足的规则生效；所有规则均不满足时，流量按默认后端权重分配。</div>
          <div id="route-list"></div>
          <button class="btn btn-default btn-sm" onclick="addRoute()">+ 添加路由规则</button>
          <div id="error-routes" class="form-error-msg" style="display:none;margin-top:4px"></div>
        </div>
      </div>

      <div class="form-item" style="align-items:flex-start">
        <label class="form-label" style="padding-top:2px">默认后端</label>
        <div class="form-control">
          <div class="form-hint" style="margin-top:0;margin-bottom:8px">所有条件路由不匹配时按此权重分配。至少 1 个后端，权重之和须等于 100。</div>
          <div id="backend-list"></div>
          <button class="btn btn-default btn-sm" onclick="addBackendRow()" style="margin-top:4px">+ 添加后端</button>
          <div id="error-backends" class="form-error-msg" style="display:none;margin-top:4px"></div>
        </div>
      </div>

      <div class="form-item">
        <label class="form-label">描述</label>
        <div class="form-control">
          <textarea id="form-desc" class="ant-input" rows="3" placeholder="说明该虚拟服务的用途，如灰度发布策略（选填）"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeVsModal()">取消</button>
      <button class="btn btn-primary" onclick="submitVsModal()">确定</button>
    </div>
  </div>
</div>

<!-- 查看详情 Modal -->
<div id="view-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeViewModal()">
  <div class="ant-modal" style="width:580px">
    <div class="modal-header">
      <span class="modal-title">虚拟服务详情</span>
      <button class="modal-close" onclick="closeViewModal()">×</button>
    </div>
    <div class="modal-body modal-body-scroll" id="view-body"></div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeViewModal()">关闭</button>
    </div>
  </div>
</div>

<script src="../../data/virtual-services.js"></script>
<script src="../../data/services.js"></script>
<script src="../../js/common.js"></script>
<script>
const PAGE_SIZE = 10;
let currentPage = 1;
let editingId = null;
let activeFilter = { ns: '', kw: '' };

// Form state
let formRoutes   = []; // [{ id, conditions:[{type,field,matchType,value}], targetServiceId, targetServiceName }]
let formBackends = []; // [{ serviceId, serviceName, weight }]

const { load, save } = useStorage('srsd_virtual_services', SEED_VIRTUAL_SERVICES);
let list = load();

const { load: loadSvcs } = useStorage('srsd_services', SEED_SERVICES);
const allSvcs = loadSvcs();

const NS_BIZLINE = {
  'domeos-pub': '北京研发中心', 'sohu-cs-public': '北京研发中心',
  'changjie-test': '北京研发中心', 'panther-backend': '大数据中心',
  'cloud-native': '大数据中心', 'panther-web': '大数据中心', 'image-delete': '北京研发部',
};

const COND_TYPE_LABEL = { header: 'HTTP 请求头', cookie: 'Cookie', query: '查询参数', path: '路径前缀' };
const MATCH_TYPE_LABEL = { exact: '精确', prefix: '前缀', regex: '正则' };

function getFilteredList() {
  return list.filter(item => {
    const nsOk = !activeFilter.ns || item.ns === activeFilter.ns;
    const kwOk = !activeFilter.kw || item.name.includes(activeFilter.kw) || (item.desc||'').includes(activeFilter.kw);
    return nsOk && kwOk;
  });
}

function routeSummary(row) {
  const routes = row.routes || [];
  const backs  = row.backends || [];
  if (routes.length === 0) return `仅权重分配（${backs.length} 个后端）`;
  return `${routes.length} 条件路由 + 权重分配`;
}

function renderTable() {
  const filtered = getFilteredList();
  const paged    = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  document.getElementById('page-total').textContent = `共 ${filtered.length} 条`;
  const tbody = document.getElementById('table-body');
  if (paged.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-table">暂无虚拟服务</div></td></tr>';
    renderPagination(0); return;
  }
  tbody.innerHTML = paged.map(row => `<tr>
    <td><a href="#" onclick="openViewModal('${escHtml(row.id)}');return false">${escHtml(row.name)}</a></td>
    <td>${escHtml(row.ns)}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(row.proxy)}">${escHtml(row.proxy)}</td>
    <td class="route-summary">${escHtml(routeSummary(row))}</td>
    <td>${escHtml(row.createdBy)}</td>
    <td>${escHtml(formatTime(row.createdAt))}</td>
    <td>
      <button class="btn btn-link" data-action="edit"   data-id="${escHtml(row.id)}">编辑</button>
      <button class="btn btn-link danger" data-action="delete" data-id="${escHtml(row.id)}">删除</button>
    </td>
  </tr>`).join('');
  renderPagination(filtered.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE) || 1;
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML =
    `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>` +
    Array.from({length:pages},(_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('') +
    `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>`;
}
function goPage(p) {
  const pages = Math.ceil(getFilteredList().length / PAGE_SIZE) || 1;
  if (p < 1 || p > pages) return;
  currentPage = p; renderTable();
}
function applySearch() {
  activeFilter.ns = document.getElementById('search-ns').value;
  activeFilter.kw = document.getElementById('search-kw').value.trim();
  currentPage = 1; renderTable();
}
function handleReset() {
  document.getElementById('search-ns').value = '';
  document.getElementById('search-kw').value = '';
  activeFilter = { ns: '', kw: '' };
  currentPage = 1; renderTable();
}

/* ───── Form ───── */

function currentNsSvcs() {
  const ns = document.getElementById('form-ns').value;
  return ns ? allSvcs.filter(s => s.ns === ns) : [];
}

function svcOptions(selected) {
  const svcs = currentNsSvcs();
  if (svcs.length === 0) return '<option value="">请先选择命名空间</option>';
  return '<option value="">请选择服务</option>' +
    svcs.map(s => `<option value="${escHtml(s.id)}" ${selected === s.id ? 'selected' : ''}>${escHtml(s.name)}</option>`).join('');
}

/* ── Route UI ── */

function renderRouteList() {
  const svcs = currentNsSvcs();
  const targetOpts = svcs.length === 0
    ? '<option value="">请先选择命名空间</option>'
    : '<option value="">请选择目标服务</option>' + svcs.map(s => `<option value="${escHtml(s.id)}">${escHtml(s.name)}</option>`).join('');

  document.getElementById('route-list').innerHTML = formRoutes.length === 0
    ? '<div style="color:rgba(0,0,0,0.25);font-size:13px;margin-bottom:8px">暂无条件路由，流量将全部按权重分配到默认后端。</div>'
    : formRoutes.map((r, ri) => `
      <div class="route-card" data-route-idx="${ri}">
        <div class="route-card-header">
          <span>规则 #${ri + 1}</span>
          <button class="btn btn-link danger btn-sm" onclick="removeRoute(${ri})">删除规则</button>
        </div>
        <div class="route-card-body">
          <table class="cond-table">
            <thead>
              <tr>
                <th style="width:112px">匹配类型</th>
                <th style="width:88px">字段名</th>
                <th style="width:72px">匹配方式</th>
                <th>匹配值</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${r.conditions.map((c, ci) => renderCondRow(ri, ci, c)).join('')}</tbody>
          </table>
          <button class="btn btn-link btn-sm" onclick="syncAndAddCondition(${ri})">+ 添加条件</button>
          <div class="route-target-row">
            <span class="route-target-label">命中时转发至</span>
            <select class="ant-select route-target-sel" style="flex:1" onchange="syncRoutesFromDOM()">
              ${targetOpts}
            </select>
          </div>
        </div>
      </div>`).join('');

  // restore target select values
  formRoutes.forEach((r, ri) => {
    if (!r.targetServiceId) return;
    const card = document.getElementById('route-list').querySelectorAll('[data-route-idx]')[ri];
    if (!card) return;
    const sel = card.querySelector('.route-target-sel');
    if (sel) sel.value = r.targetServiceId;
  });
}

function renderCondRow(ri, ci, c) {
  const isPath = c.type === 'path';
  return `<tr data-cond-idx="${ci}">
    <td>
      <select class="ant-select cond-type" style="width:100%" onchange="handleCondTypeChange(${ri},${ci},this.value)">
        <option value="header" ${c.type==='header'?'selected':''}>HTTP 请求头</option>
        <option value="cookie" ${c.type==='cookie'?'selected':''}>Cookie</option>
        <option value="query"  ${c.type==='query' ?'selected':''}>查询参数</option>
        <option value="path"   ${c.type==='path'  ?'selected':''}>路径前缀</option>
      </select>
    </td>
    <td>${isPath
      ? '<span class="cond-dash">—</span>'
      : `<input class="ant-input cond-field" style="width:100%" placeholder="字段名" value="${escHtml(c.field||'')}" oninput="syncRoutesFromDOM()" />`}
    </td>
    <td>${isPath
      ? '<span class="cond-dash" style="font-size:11px">前缀</span>'
      : `<select class="ant-select cond-match" style="width:100%" onchange="syncRoutesFromDOM()">
          <option value="exact"  ${c.matchType==='exact' ?'selected':''}>精确</option>
          <option value="prefix" ${c.matchType==='prefix'?'selected':''}>前缀</option>
          <option value="regex"  ${c.matchType==='regex' ?'selected':''}>正则</option>
        </select>`}
    </td>
    <td>
      <input class="ant-input cond-value" style="width:100%" placeholder="${isPath ? '如 /api/v2/' : '匹配值'}" value="${escHtml(c.value||'')}" oninput="syncRoutesFromDOM()" />
    </td>
    <td>
      <button class="btn btn-link danger btn-sm" onclick="syncAndRemoveCondition(${ri},${ci})">×</button>
    </td>
  </tr>`;
}

function syncRoutesFromDOM() {
  const routeCards = document.getElementById('route-list').querySelectorAll('[data-route-idx]');
  routeCards.forEach((card, ri) => {
    if (!formRoutes[ri]) return;
    const targetSel = card.querySelector('.route-target-sel');
    if (targetSel) {
      formRoutes[ri].targetServiceId   = targetSel.value;
      formRoutes[ri].targetServiceName = targetSel.selectedOptions[0]?.text || '';
    }
    const condRows = card.querySelectorAll('tbody tr[data-cond-idx]');
    condRows.forEach((row, ci) => {
      if (!formRoutes[ri].conditions[ci]) return;
      const typeSel  = row.querySelector('.cond-type');
      const fieldIn  = row.querySelector('.cond-field');
      const matchSel = row.querySelector('.cond-match');
      const valueIn  = row.querySelector('.cond-value');
      if (typeSel)  formRoutes[ri].conditions[ci].type      = typeSel.value;
      if (fieldIn)  formRoutes[ri].conditions[ci].field     = fieldIn.value;
      if (matchSel) formRoutes[ri].conditions[ci].matchType = matchSel.value;
      if (valueIn)  formRoutes[ri].conditions[ci].value     = valueIn.value;
    });
  });
}

function addRoute() {
  syncRoutesFromDOM();
  formRoutes.push({ id: genId(), conditions: [{ type: 'header', field: '', matchType: 'exact', value: '' }], targetServiceId: '', targetServiceName: '' });
  renderRouteList();
}

function removeRoute(ri) {
  syncRoutesFromDOM();
  formRoutes.splice(ri, 1);
  renderRouteList();
}

function syncAndAddCondition(ri) {
  syncRoutesFromDOM();
  formRoutes[ri].conditions.push({ type: 'header', field: '', matchType: 'exact', value: '' });
  renderRouteList();
}

function syncAndRemoveCondition(ri, ci) {
  syncRoutesFromDOM();
  formRoutes[ri].conditions.splice(ci, 1);
  if (formRoutes[ri].conditions.length === 0) {
    formRoutes[ri].conditions.push({ type: 'header', field: '', matchType: 'exact', value: '' });
  }
  renderRouteList();
}

function handleCondTypeChange(ri, ci, type) {
  syncRoutesFromDOM();
  formRoutes[ri].conditions[ci].type = type;
  if (type === 'path') {
    formRoutes[ri].conditions[ci].matchType = 'prefix';
    formRoutes[ri].conditions[ci].field = '';
  }
  renderRouteList();
}

/* ── Backend UI ── */

function renderBackendList() {
  const svcs = currentNsSvcs();
  const opts = '<option value="">请选择服务</option>' +
    svcs.map(s => `<option value="${escHtml(s.id)}">${escHtml(s.name)}</option>`).join('');

  document.getElementById('backend-list').innerHTML = formBackends.map((b, i) => `
    <div class="backend-row" data-backend-idx="${i}">
      <select class="ant-select" style="flex:1">
        <option value="">请选择服务</option>
        ${svcs.map(s => `<option value="${escHtml(s.id)}" ${b.serviceId === s.id ? 'selected' : ''}>${escHtml(s.name)}</option>`).join('')}
      </select>
      <span style="color:rgba(0,0,0,0.45);white-space:nowrap;font-size:13px">权重</span>
      <input type="number" class="ant-input" style="width:70px" min="0" max="100" value="${b.weight}" />
      <span style="color:rgba(0,0,0,0.45)">%</span>
      ${formBackends.length > 1 ? `<button class="btn btn-link danger btn-sm" onclick="removeBackend(${i})">移除</button>` : ''}
    </div>`).join('');
}

function syncBackendsFromDOM() {
  const rows = document.getElementById('backend-list').querySelectorAll('[data-backend-idx]');
  rows.forEach((row, i) => {
    if (!formBackends[i]) return;
    const sel = row.querySelector('select');
    const inp = row.querySelector('input[type=number]');
    if (sel) { formBackends[i].serviceId = sel.value; formBackends[i].serviceName = sel.selectedOptions[0]?.text || ''; }
    if (inp) formBackends[i].weight = +inp.value;
  });
}

function addBackendRow() {
  syncBackendsFromDOM();
  formBackends.push({ serviceId: '', serviceName: '', weight: 0 });
  renderBackendList();
}

function removeBackend(i) {
  syncBackendsFromDOM();
  formBackends.splice(i, 1);
  renderBackendList();
}

/* ── Open / Close Modals ── */

function openCreateModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新建虚拟服务';
  document.getElementById('form-name').value     = '';
  document.getElementById('form-name').disabled  = false;
  document.getElementById('form-ns').value       = '';
  document.getElementById('form-desc').value     = '';
  formRoutes   = [];
  formBackends = [{ serviceId: '', serviceName: '', weight: 50 }, { serviceId: '', serviceName: '', weight: 50 }];
  ['error-name','error-ns','error-routes','error-backends'].forEach(id => { document.getElementById(id).style.display = 'none'; });
  renderRouteList();
  renderBackendList();
  openModal(document.getElementById('vs-modal'));
}

function openEditModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '编辑虚拟服务';
  document.getElementById('form-name').value     = row.name;
  document.getElementById('form-name').disabled  = true;
  document.getElementById('form-ns').value       = row.ns;
  document.getElementById('form-desc').value     = row.desc || '';
  formRoutes   = JSON.parse(JSON.stringify(row.routes || []));
  formBackends = JSON.parse(JSON.stringify(row.backends || []));
  if (formBackends.length === 0) formBackends.push({ serviceId: '', serviceName: '', weight: 100 });
  ['error-name','error-ns','error-routes','error-backends'].forEach(id => { document.getElementById(id).style.display = 'none'; });
  renderRouteList();
  renderBackendList();
  openModal(document.getElementById('vs-modal'));
}

function closeVsModal() { closeModal(document.getElementById('vs-modal')); }

function handleNsChange() {
  syncRoutesFromDOM();
  syncBackendsFromDOM();
  formBackends = [{ serviceId: '', serviceName: '', weight: 50 }, { serviceId: '', serviceName: '', weight: 50 }];
  formRoutes.forEach(r => { r.targetServiceId = ''; r.targetServiceName = ''; });
  renderRouteList();
  renderBackendList();
}

/* ── Submit ── */

function submitVsModal() {
  syncRoutesFromDOM();
  syncBackendsFromDOM();

  const name = document.getElementById('form-name').value.trim();
  const ns   = document.getElementById('form-ns').value;
  let ok = true;

  if (!name || !/^[a-z][a-z0-9-]*$/.test(name)) {
    document.getElementById('error-name').textContent = '名称以小写字母开头，可包含小写字母、数字和连字符';
    document.getElementById('error-name').style.display = ''; ok = false;
  } else document.getElementById('error-name').style.display = 'none';

  if (!ns) {
    document.getElementById('error-ns').textContent = '请选择命名空间';
    document.getElementById('error-ns').style.display = ''; ok = false;
  } else document.getElementById('error-ns').style.display = 'none';

  // validate routes
  const routeErr = formRoutes.reduce((err, r, i) => {
    if (err) return err;
    if (!r.targetServiceId) return `规则 #${i+1} 未选择目标服务`;
    const condErr = r.conditions.some(c => !c.value.trim() || (c.type !== 'path' && !c.field.trim()));
    if (condErr) return `规则 #${i+1} 有未填写完整的匹配条件`;
    return '';
  }, '');
  if (routeErr) {
    document.getElementById('error-routes').textContent = routeErr;
    document.getElementById('error-routes').style.display = ''; ok = false;
  } else document.getElementById('error-routes').style.display = 'none';

  // validate backends
  const unset  = formBackends.some(b => !b.serviceId);
  const totalW = formBackends.reduce((s, b) => s + (b.weight || 0), 0);
  if (formBackends.length === 0 || unset || totalW !== 100) {
    document.getElementById('error-backends').textContent =
      formBackends.length === 0 ? '至少需要 1 个默认后端' :
      unset ? '请选择所有后端服务' : `权重之和必须等于 100（当前：${totalW}）`;
    document.getElementById('error-backends').style.display = ''; ok = false;
  } else document.getElementById('error-backends').style.display = 'none';

  if (!ok) return;

  const bizline = NS_BIZLINE[ns] || '';
  const desc    = document.getElementById('form-desc').value.trim();
  const proxy   = `${name}-${ns}.domeos.sohucs.com`;

  if (editingId) {
    list = list.map(r => r.id === editingId
      ? { ...r, bizline, desc, routes: JSON.parse(JSON.stringify(formRoutes)), backends: JSON.parse(JSON.stringify(formBackends)) }
      : r);
    showToast('虚拟服务已更新');
  } else {
    list.unshift({ id: genId(), name, ns, bizline, proxy, desc,
      routes: JSON.parse(JSON.stringify(formRoutes)),
      backends: JSON.parse(JSON.stringify(formBackends)),
      createdBy: '吕青华', createdAt: now() });
    showToast('虚拟服务已创建');
  }
  save(list); closeVsModal(); renderTable();
}

/* ── View Modal ── */

function openViewModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  const routes = row.routes || [];
  const backends = row.backends || [];

  const routesHtml = routes.length === 0
    ? '<div style="color:rgba(0,0,0,0.25);font-size:13px">无条件路由</div>'
    : routes.map((r, i) => {
        const conds = r.conditions.map(c =>
          c.type === 'path'
            ? `路径前缀 ${escHtml(c.value)}`
            : `${escHtml(COND_TYPE_LABEL[c.type]||c.type)} ${escHtml(c.field)} ${escHtml(MATCH_TYPE_LABEL[c.matchType]||c.matchType)} "${escHtml(c.value)}"`
        ).join(' 且 ');
        return `<div style="margin-bottom:6px;font-size:13px">
          <span style="background:#e6f7ff;border:1px solid #91d5ff;color:#1890ff;padding:1px 6px;font-size:11px;border-radius:2px;margin-right:4px">规则${i+1}</span>
          ${escHtml(conds)} → <strong>${escHtml(r.targetServiceName||r.targetServiceId)}</strong>
        </div>`;
      }).join('');

  const backendsHtml = backends.map(b =>
    `<div style="margin-bottom:4px;font-size:13px">${escHtml(b.serviceName||b.serviceId)} <span class="weight-badge">${b.weight}%</span></div>`
  ).join('');

  document.getElementById('view-body').innerHTML = `
    <div class="desc-list">
      <div class="desc-item"><div class="desc-label">服务名称</div><div class="desc-value">${escHtml(row.name)}</div></div>
      <div class="desc-item"><div class="desc-label">命名空间</div><div class="desc-value">${escHtml(row.ns)}</div></div>
      <div class="desc-item" style="grid-column:span 2"><div class="desc-label">代理地址</div><div class="desc-value">${escHtml(row.proxy)}</div></div>
      <div class="desc-item"><div class="desc-label">业务线</div><div class="desc-value">${escHtml(row.bizline||'--')}</div></div>
      <div class="desc-item"><div class="desc-label">创建人</div><div class="desc-value">${escHtml(row.createdBy)}</div></div>
      <div class="desc-item" style="grid-column:span 2"><div class="desc-label">描述</div><div class="desc-value">${escHtml(row.desc||'--')}</div></div>
      <div class="desc-item" style="grid-column:span 2">
        <div class="desc-label">条件路由规则</div>
        <div class="desc-value">${routesHtml}</div>
      </div>
      <div class="desc-item" style="grid-column:span 2">
        <div class="desc-label">默认后端（权重分配）</div>
        <div class="desc-value">${backendsHtml}</div>
      </div>
    </div>`;
  openModal(document.getElementById('view-modal'));
}
function closeViewModal() { closeModal(document.getElementById('view-modal')); }

/* ── Event delegation ── */
document.addEventListener('click', e => {
  const action = e.target.dataset.action;
  const id     = e.target.dataset.id;
  if (!action || !id) return;
  if (action === 'edit') { openEditModal(id); }
  if (action === 'delete') {
    const row = list.find(r => r.id === id);
    confirm2(`确认删除虚拟服务「${row?.name}」？`, () => {
      list = list.filter(r => r.id !== id);
      save(list); renderTable(); showToast('已删除');
    });
  }
});

document.getElementById('search-ns').addEventListener('change', e => { activeFilter.ns = e.target.value; currentPage = 1; renderTable(); });

renderTable();
</script>

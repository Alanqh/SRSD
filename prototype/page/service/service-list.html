<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>服务列表 - 服务注册与发现</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <style>
    .auth-tag { font-size: 12px; }
  </style>
</head>
<body>
  <div class="toast-list"></div>
  <div id="confirm-overlay" class="confirm-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title"><span>⚠️</span><span id="confirm-title">操作确认</span></div>
      <div class="confirm-content" id="confirm-content"></div>
      <div class="confirm-actions">
        <button class="btn btn-default" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="confirmOk()">确定</button>
      </div>
    </div>
  </div>
<main class="main-content">
      <div class="page-header">
        <nav class="breadcrumb">
          <span>服务注册与发现</span><span class="sep">/</span><span class="current">服务列表</span>
        </nav>
        <div class="page-title-row">
          <h2 class="page-title">服务列表</h2>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="openCreateModal()">+ 新建</button>
          </div>
        </div>
      </div>

      <div class="content-body">
        <div class="search-bar">
          <div class="search-item">
            <label>命名空间</label>
            <select id="search-ns" class="ant-select">
              <option value="">全部空间</option>
              <option value="domeos-pub">domeos-pub</option>
              <option value="sohu-cs-public">sohu-cs-public</option>
              <option value="changjie-test">changjie-test</option>
              <option value="panther-backend">panther-backend</option>
              <option value="cloud-native">cloud-native</option>
              <option value="panther-web">panther-web</option>
            </select>
          </div>
          <div class="search-item">
            <label>业务线</label>
            <select id="search-bizline" class="ant-select">
              <option value="">全部业务线</option>
              <option value="北京研发中心">北京研发中心</option>
              <option value="大数据中心">大数据中心</option>
            </select>
          </div>
          <div class="search-item">
            <label>关键词</label>
            <input id="search-kw" class="ant-input" placeholder="搜索服务名、描述、代理地址" onkeyup="if(event.key==='Enter')handleSearch()" />
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="handleSearch()">查询</button>
            <button class="btn btn-default" onclick="handleReset()">重置</button>
          </div>
        </div>

        <div class="ant-card">
          <table class="ant-table" style="width:100%">
            <thead>
              <tr>
                <th>服务名</th>
                <th>命名空间</th>
                <th>业务线</th>
                <th>代理地址</th>
                <th>鉴权</th>
                <th>描述</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
          <div class="table-footer">
            <span id="page-total" class="pagination-total"></span>
            <div id="pagination" class="ant-pagination"></div>
          </div>
        </div>
      </div>
    </main>

  <div id="svc-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSvcModal()">
    <div class="ant-modal" style="width:580px">
      <div class="modal-header">
        <span id="modal-title" class="modal-title">新建服务</span>
        <button class="modal-close" onclick="closeSvcModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label required">命名空间</label>
          <div class="form-control">
            <select id="form-ns" class="ant-select">
              <option value="">请选择</option>
              <option value="domeos-pub">domeos-pub</option>
              <option value="sohu-cs-public">sohu-cs-public</option>
              <option value="changjie-test">changjie-test</option>
              <option value="panther-backend">panther-backend</option>
              <option value="cloud-native">cloud-native</option>
              <option value="panther-web">panther-web</option>
              <option value="image-delete">image-delete</option>
            </select>
            <div id="error-ns" class="form-error-msg" style="display:none"></div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label required">服务名</label>
          <div class="form-control">
            <input id="form-svcname" class="ant-input" placeholder="以小写字母开头，可包含小写字母、数字和连字符" />
            <div id="error-svcname" class="form-error-msg" style="display:none"></div>
            <div class="form-hint">以小写字母开头，可包含小写字母、数字和连字符，不能以连字符结尾</div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label required">实例地址类型</label>
          <div class="form-control">
            <select id="form-addrtype" class="ant-select">
              <option value="">请选择</option>
              <option value="ip">只包含IP地址</option>
              <option value="domain">包含IP地址和域名</option>
            </select>
            <div id="error-addrtype" class="form-error-msg" style="display:none"></div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label required">协议类型</label>
          <div class="form-control">
            <select id="form-protocol" class="ant-select">
              <option value="">请选择</option>
              <option value="http">http</option>
              <option value="https">https</option>
              <option value="grpc">grpc</option>
            </select>
            <div id="error-protocol" class="form-error-msg" style="display:none"></div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label">服务描述</label>
          <div class="form-control">
            <textarea id="form-desc" class="ant-input" rows="3" placeholder="建议对服务的主要功能、适用范围进行描述，可附加接口文档地址"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeSvcModal()">取消</button>
        <button class="btn btn-primary" onclick="submitSvcModal()">确定</button>
      </div>
    </div>

<script src="../../data/services.js"></script>
<script src="../../js/common.js"></script>
<script>
const PAGE_SIZE = 10;
let currentPage = 1;
let editingId = null;
let activeFilter = { ns: '', bizline: '', kw: '' };

const NS_BIZLINE = {
  'domeos-pub': '北京研发中心', 'sohu-cs-public': '北京研发中心',
  'changjie-test': '北京研发中心', 'panther-backend': '大数据中心',
  'cloud-native': '大数据中心', 'panther-web': '大数据中心', 'image-delete': '北京研发部',
};


const { load, save } = useStorage('srsd_services', SEED_SERVICES);
let list = load();

const AUTH_LABEL = { none: '--', disabled: '已关闭', basic: 'Basic', forward: 'Forward' };
const AUTH_CLASS = { none: 'tag-default', disabled: 'tag-default', basic: 'tag-processing', forward: 'tag-success' };

function getFilteredList() {
  return list.filter(item => {
    const nsOk      = !activeFilter.ns      || item.ns === activeFilter.ns;
    const bizlineOk = !activeFilter.bizline || item.bizline === activeFilter.bizline;
    const kwOk      = !activeFilter.kw      || item.name.includes(activeFilter.kw) || item.desc.includes(activeFilter.kw) || item.proxy.includes(activeFilter.kw);
    return nsOk && bizlineOk && kwOk;
  });
}

function getPagedList(filtered) {
  return filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
}

function renderTable() {
  const filtered = getFilteredList();
  const paged = getPagedList(filtered);
  const tbody = document.getElementById('table-body');
  document.getElementById('page-total').textContent = `共 ${filtered.length} 条`;

  if (paged.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-table">暂无数据</div></td></tr>';
    renderPagination(0);
    return;
  }
  tbody.innerHTML = paged.map(row => `
    <tr>
      <td><a href="service-detail.html?id=${escHtml(row.id)}">${escHtml(row.name)}</a></td>
      <td>${escHtml(row.ns)}</td>
      <td>${escHtml(row.bizline || '--')}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(row.proxy)}">${escHtml(row.proxy)}</td>
      <td><span class="tag ${AUTH_CLASS[row.auth]}">${AUTH_LABEL[row.auth]}</span></td>
      <td>${escHtml(row.desc || '--')}</td>
      <td>${escHtml(formatTime(row.createdAt))}</td>
      <td>
        <a class="btn btn-link" href="service-detail.html?id=${escHtml(row.id)}">详情</a>
        <button class="btn btn-link" data-action="edit" data-id="${escHtml(row.id)}">编辑</button>
        <button class="btn btn-link danger" data-action="delete" data-id="${escHtml(row.id)}">删除</button>
      </td>
    </tr>
  `).join('');
  renderPagination(filtered.length);
}

function renderPagination(total) {
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">‹</button>`;
  for (let p = 1; p <= totalPages; p++) {
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  html += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

document.getElementById('table-body').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = btn.dataset.id;
  if (btn.dataset.action === 'edit') openEditModal(id);
  if (btn.dataset.action === 'delete') handleConfirmDelete(id);
});

document.getElementById('pagination').addEventListener('click', e => {
  const btn = e.target.closest('[data-page]');
  if (!btn || btn.disabled) return;
  const filtered = getFilteredList();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const p = Number(btn.dataset.page);
  if (p >= 1 && p <= totalPages) { currentPage = p; renderTable(); }
});

function handleSearch() {
  activeFilter.ns      = document.getElementById('search-ns').value;
  activeFilter.bizline = document.getElementById('search-bizline').value;
  activeFilter.kw      = document.getElementById('search-kw').value.trim();
  currentPage = 1;
  renderTable();
}

function handleReset() {
  document.getElementById('search-ns').value      = '';
  document.getElementById('search-bizline').value = '';
  document.getElementById('search-kw').value      = '';
  activeFilter = { ns: '', bizline: '', kw: '' };
  currentPage = 1;
  renderTable();
}

function setFieldError(field, msg) {
  const errEl   = document.getElementById(`error-${field}`);
  const inputEl = document.getElementById(`form-${field}`);
  if (errEl) { errEl.textContent = msg; errEl.style.display = msg ? 'block' : 'none'; }
  if (inputEl) inputEl.classList.toggle('error', !!msg);
}

function openCreateModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新建服务';
  document.getElementById('form-svcname').value = '';
  document.getElementById('form-svcname').disabled = false;
  document.getElementById('form-ns').value = '';
  document.getElementById('form-addrtype').value = '';
  document.getElementById('form-protocol').value = '';
  document.getElementById('form-desc').value = '';
  ['ns', 'svcname', 'addrtype', 'protocol'].forEach(f => setFieldError(f, ''));
  openModal(document.getElementById('svc-modal'));
}

function openEditModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '编辑服务';
  document.getElementById('form-svcname').value = row.name;
  document.getElementById('form-svcname').disabled = true;
  document.getElementById('form-ns').value = row.ns;
  document.getElementById('form-addrtype').value = row.addrType;
  document.getElementById('form-protocol').value = row.protocol;
  document.getElementById('form-desc').value = row.desc || '';
  ['ns', 'svcname', 'addrtype', 'protocol'].forEach(f => setFieldError(f, ''));
  openModal(document.getElementById('svc-modal'));
}

function closeSvcModal() {
  closeModal(document.getElementById('svc-modal'));
}

function submitSvcModal() {
  const ns       = document.getElementById('form-ns').value;
  const svcname  = document.getElementById('form-svcname').value.trim();
  const addrtype = document.getElementById('form-addrtype').value;
  const protocol = document.getElementById('form-protocol').value;
  const desc     = document.getElementById('form-desc').value.trim();

  let valid = true;
  if (!ns) { setFieldError('ns', '请选择命名空间'); valid = false; } else { setFieldError('ns', ''); }
  if (!editingId) {
    if (!svcname) { setFieldError('svcname', '服务名不能为空'); valid = false; }
    else if (!/^[a-z][a-z0-9-]*[a-z0-9]$/.test(svcname) && !/^[a-z]$/.test(svcname)) { setFieldError('svcname', '以小写字母开头，可包含小写字母、数字和连字符，不能以连字符结尾'); valid = false; }
    else { setFieldError('svcname', ''); }
  }
  if (!addrtype) { setFieldError('addrtype', '请选择实例地址类型'); valid = false; } else { setFieldError('addrtype', ''); }
  if (!protocol) { setFieldError('protocol', '请选择协议类型'); valid = false; } else { setFieldError('protocol', ''); }
  if (!valid) return;

  const bizline = NS_BIZLINE[ns] || '';
  const proxy   = editingId ? list.find(r => r.id === editingId).proxy : `${svcname}-${ns}.domeos.sohucs.com`;

  if (editingId) {
    const item = list.find(r => r.id === editingId);
    if (item) Object.assign(item, { ns, addrType: addrtype, protocol, desc, bizline, updatedAt: now() });
    save(list);
    showToast('编辑成功');
  } else {
    if (list.find(r => r.name === svcname && r.ns === ns)) { setFieldError('svcname', '该命名空间下服务名已存在'); return; }
    list.unshift({ id: genId(), name: svcname, ns, bizline, proxy, auth: 'disabled', desc, protocol, addrType: addrtype, createdAt: now(), updatedAt: now() });
    save(list);
    currentPage = 1;
    showToast('创建成功');
  }
  closeSvcModal();
  renderTable();
}

function handleConfirmDelete(id) {
  const row = list.find(r => r.id === id);
  confirm2(`确认删除服务「${row?.name}」？删除后无法恢复。`, () => {
    list = list.filter(r => r.id !== id);
    save(list);
    renderTable();
    showToast('删除成功');
  });
}

renderTable();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>命名空间 - 服务注册与发现</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <style>
    .type-tag { font-size: 12px; padding: 1px 6px; border-radius: 0; border: 1px solid; display: inline-block; }
    .type-public { color: #1890ff; background: #e6f7ff; border-color: #91d5ff; }
    .type-private { color: rgba(0,0,0,0.65); background: #fafafa; border-color: #d9d9d9; }
  </style>
</head>
<body>
  <div class="toast-list"></div>
  <div id="confirm-overlay" class="confirm-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title"><span>⚠️</span><span id="confirm-title">操作确认</span></div>
      <div class="confirm-content" id="confirm-content"></div>
      <div class="confirm-actions">
        <button class="btn btn-default" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="confirmOk()">确定</button>
      </div>
    </div>
  </div>
<main class="main-content">
      <div class="page-header">
        <nav class="breadcrumb">
          <span>服务注册与发现</span><span class="sep">/</span><span class="current">空间列表</span>
        </nav>
        <div class="page-title-row">
          <h2 class="page-title">空间列表</h2>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="openCreateModal()">+ 新建</button>
          </div>
        </div>
      </div>

      <div class="content-body">
        <div class="search-bar">
          <div class="search-item">
            <label>空间类型</label>
            <select id="search-type" class="ant-select">
              <option value="">全部空间</option>
              <option value="public">公共空间</option>
              <option value="private">私有空间</option>
            </select>
          </div>
          <div class="search-item">
            <label>业务线</label>
            <select id="search-bizline" class="ant-select">
              <option value="">全部业务线</option>
              <option value="北京研发部">北京研发部</option>
              <option value="北京研发中心">北京研发中心</option>
              <option value="大数据中心">大数据中心</option>
            </select>
          </div>
          <div class="search-item">
            <label>关键词</label>
            <input id="search-kw" class="ant-input" placeholder="搜索空间名称、描述、持有人" onkeyup="if(event.key==='Enter')handleSearch()" />
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="handleSearch()">查询</button>
            <button class="btn btn-default" onclick="handleReset()">重置</button>
          </div>
        </div>

        <div class="ant-card">
          <table class="ant-table" style="width:100%">
            <thead>
              <tr>
                <th>空间名称</th>
                <th>空间类型</th>
                <th>描述</th>
                <th>服务数</th>
                <th>持有人</th>
                <th>业务线</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
          <div class="table-footer">
            <span id="page-total" class="pagination-total"></span>
            <div id="pagination" class="ant-pagination"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="ns-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeNsModal()">
    <div class="ant-modal">
      <div class="modal-header">
        <span id="modal-title" class="modal-title">新建空间</span>
        <button class="modal-close" onclick="closeNsModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label required">空间名称</label>
          <div class="form-control">
            <input id="form-name" class="ant-input" placeholder="以小写字母开头，可包含小写字母、数字和连字符" />
            <div id="error-name" class="form-error-msg" style="display:none"></div>
            <div class="form-hint">以小写字母开头，可包含小写字母、数字和连字符，不能以连字符结尾</div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label required">空间类型</label>
          <div class="form-control">
            <select id="form-type" class="ant-select">
              <option value="">请选择</option>
              <option value="public">公共空间</option>
              <option value="private">私有空间</option>
            </select>
            <div id="error-type" class="form-error-msg" style="display:none"></div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label">空间描述</label>
          <div class="form-control">
            <textarea id="form-desc" class="ant-input" rows="3" placeholder="请输入空间描述（选填）"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeNsModal()">取消</button>
        <button class="btn btn-primary" onclick="submitNsModal()">确定</button>
      </div>
    </div>

<script src="../../data/namespaces.js"></script>
<script src="../../js/common.js"></script>
<script>
const PAGE_SIZE = 10;
let currentPage = 1;
let editingId = null;
let activeFilter = { type: '', bizline: '', kw: '' };


const { load, save } = useStorage('srsd_namespaces', SEED_NAMESPACES);
let list = load();

function getFilteredList() {
  return list.filter(item => {
    const typeOk    = !activeFilter.type    || item.type === activeFilter.type;
    const bizlineOk = !activeFilter.bizline || item.bizline === activeFilter.bizline;
    const kwOk      = !activeFilter.kw      || item.name.includes(activeFilter.kw) || item.desc.includes(activeFilter.kw) || item.owner.includes(activeFilter.kw);
    return typeOk && bizlineOk && kwOk;
  });
}

function getPagedList(filtered) {
  const start = (currentPage - 1) * PAGE_SIZE;
  return filtered.slice(start, start + PAGE_SIZE);
}

function renderTable() {
  const filtered = getFilteredList();
  const paged = getPagedList(filtered);
  const tbody = document.getElementById('table-body');
  document.getElementById('page-total').textContent = `共 ${filtered.length} 条`;

  if (paged.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-table">暂无数据</div></td></tr>';
    return;
  }
  tbody.innerHTML = paged.map(row => `
    <tr data-id="${escHtml(row.id)}">
      <td><a href="#">${escHtml(row.name)}</a></td>
      <td><span class="type-tag ${row.type === 'public' ? 'type-public' : 'type-private'}">${row.type === 'public' ? '公共空间' : '私有空间'}</span></td>
      <td>${escHtml(row.desc || '--')}</td>
      <td>${escHtml(String(row.serviceCount))}</td>
      <td>${escHtml(row.owner)}</td>
      <td>${escHtml(row.bizline || '--')}</td>
      <td>
        <button class="btn btn-link" data-action="edit" data-id="${escHtml(row.id)}">编辑</button>
        <button class="btn btn-link danger" data-action="delete" data-id="${escHtml(row.id)}">删除</button>
      </td>
    </tr>
  `).join('');
  renderPagination(filtered.length);
}

function renderPagination(total) {
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">‹</button>`;
  for (let p = 1; p <= totalPages; p++) {
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  html += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

document.getElementById('table-body').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = btn.dataset.id;
  if (btn.dataset.action === 'edit') openEditModal(id);
  if (btn.dataset.action === 'delete') handleConfirmDelete(id);
});

document.getElementById('pagination').addEventListener('click', e => {
  const btn = e.target.closest('[data-page]');
  if (!btn || btn.disabled) return;
  const filtered = getFilteredList();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const p = Number(btn.dataset.page);
  if (p >= 1 && p <= totalPages) { currentPage = p; renderTable(); }
});

function handleSearch() {
  activeFilter.type    = document.getElementById('search-type').value;
  activeFilter.bizline = document.getElementById('search-bizline').value;
  activeFilter.kw      = document.getElementById('search-kw').value.trim();
  currentPage = 1;
  renderTable();
}

function handleReset() {
  document.getElementById('search-type').value    = '';
  document.getElementById('search-bizline').value = '';
  document.getElementById('search-kw').value      = '';
  activeFilter = { type: '', bizline: '', kw: '' };
  currentPage = 1;
  renderTable();
}

function openCreateModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新建空间';
  document.getElementById('form-name').value = '';
  document.getElementById('form-name').disabled = false;
  document.getElementById('form-type').value = '';
  document.getElementById('form-desc').value = '';
  setFieldError('name', '');
  setFieldError('type', '');
  openModal(document.getElementById('ns-modal'));
}

function openEditModal(id) {
  const row = list.find(r => r.id === id);
  if (!row) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '编辑空间';
  document.getElementById('form-name').value = row.name;
  document.getElementById('form-name').disabled = true;
  document.getElementById('form-type').value = row.type;
  document.getElementById('form-desc').value = row.desc || '';
  setFieldError('name', '');
  setFieldError('type', '');
  openModal(document.getElementById('ns-modal'));
}

function closeNsModal() {
  closeModal(document.getElementById('ns-modal'));
}

function setFieldError(field, msg) {
  const errEl   = document.getElementById(`error-${field}`);
  const inputEl = document.getElementById(`form-${field}`);
  errEl.textContent   = msg;
  errEl.style.display = msg ? 'block' : 'none';
  if (inputEl) inputEl.classList.toggle('error', !!msg);
}

function validateName(val) {
  if (!val.trim()) return '空间名称不能为空';
  if (!/^[a-z][a-z0-9-]*[a-z0-9]$/.test(val) && !/^[a-z]$/.test(val)) return '以小写字母开头，可包含小写字母、数字和连字符，不能以连字符结尾';
  return '';
}

function submitNsModal() {
  const name = document.getElementById('form-name').value.trim();
  const type = document.getElementById('form-type').value;
  const desc = document.getElementById('form-desc').value.trim();

  let valid = true;
  if (!editingId) {
    const nameErr = validateName(name);
    setFieldError('name', nameErr);
    if (nameErr) valid = false;
  }
  if (!type) { setFieldError('type', '请选择空间类型'); valid = false; } else { setFieldError('type', ''); }
  if (!valid) return;

  if (editingId) {
    const item = list.find(r => r.id === editingId);
    if (item) Object.assign(item, { type, desc, updatedAt: now() });
    save(list);
    showToast('编辑成功');
  } else {
    if (list.find(r => r.name === name)) { setFieldError('name', '空间名称已存在'); return; }
    list.unshift({ id: genId(), name, type, desc, serviceCount: 0, owner: '吕青华', bizline: '大数据中心', createdAt: now(), updatedAt: now() });
    save(list);
    currentPage = 1;
    showToast('创建成功');
  }
  closeNsModal();
  renderTable();
}

function handleConfirmDelete(id) {
  const row = list.find(r => r.id === id);
  confirm2(`确认删除命名空间「${row?.name}」？删除后无法恢复。`, () => {
    list = list.filter(r => r.id !== id);
    save(list);
    renderTable();
    showToast('删除成功');
  });
}

renderTable();
</script>
</body>
</html>
